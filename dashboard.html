<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Saakh AI Cashflow Copilot</title>
  <meta name="description" content="Saakh AI Dashboard — Prioritized financial action recommendations powered by Gemma." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=7" />
  <style>
    /* ── APP SHELL ─────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F8FAFC; font-family: 'Inter', sans-serif; color: #0F172A; }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ───────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #ffffff;
      border-right: 1px solid #E2E8F0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 22px 20px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #F1F5F9;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #10B981, #047857);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-text-wrap { line-height: 1.2; }
    .brand-name { font-size: 15px; font-weight: 700; color: #0F172A; }
    .brand-sub { font-size: 11px; color: #94A3B8; margin-top: 1px; }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: #64748B;
      text-decoration: none;
      transition: all 0.18s ease;
      position: relative;
      cursor: pointer;
    }

    .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }

    .nav-item.active {
      background: #ECFDF5;
      color: #047857;
      font-weight: 600;
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      right: 10px;
      width: 6px;
      height: 6px;
      background: #059669;
      border-radius: 50%;
    }

    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid #F1F5F9;
    }

    .gemma-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 600;
      color: #059669;
      margin-bottom: 4px;
    }

    .gemma-badge svg { width: 13px; height: 13px; }
    .sidebar-footer p { font-size: 11px; color: #94A3B8; line-height: 1.4; }

    /* ── MAIN ──────────────────────────────────────────── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #F8FAFC;
    }

    /* ── TOP BAR ───────────────────────────────────────── */
    .topbar {
      height: 64px;
      background: #ffffff;
      border-bottom: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-biz-label { font-size: 11px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.6px; }
    .topbar-biz-name { font-size: 15px; font-weight: 700; color: #0F172A; margin-top: 1px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .notif-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748B;
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
    }

    .notif-btn:hover { background: #ECFDF5; border-color: #A7F3D0; color: #059669; }

    .notif-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 7px; height: 7px;
      background: #DC2626;
      border-radius: 50%;
      border: 1.5px solid #fff;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 12px 5px 5px;
      border-radius: 30px;
      border: 1px solid #E2E8F0;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .user-chip:hover { border-color: #A7F3D0; background: #ECFDF5; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10B981, #047857);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-name { font-size: 13px; font-weight: 600; color: #0F172A; }
    .chevron { color: #94A3B8; }

    /* ── PAGE CONTENT ──────────────────────────────────── */
    .page-content {
      padding: 32px 32px 64px;
      max-width: 1100px;
    }

    /* ── SECTION HEADER ────────────────────────────────── */
    .section-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: #059669;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 5px;
    }

    .section-heading svg { color: #059669; }

    .section-desc {
      font-size: 14px;
      color: #64748B;
      margin-bottom: 28px;
    }

    /* ── CARDS GRID ────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    @media (max-width: 1024px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } }

    /* ── ACTION CARD ───────────────────────────────────── */
    .acard {
      background: #ffffff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 1px 4px rgba(15,23,42,0.05);
    }

    .acard:hover {
      box-shadow: 0 6px 24px rgba(5,150,105,0.10);
      transform: translateY(-2px);
      border-color: #A7F3D0;
    }

    .acard-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    /* Home button styling */
    .home-btn {
      margin-left: 12px;
      padding: 6px 12px;
      background: #ECFDF5;
      color: #064E3B;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .home-btn:hover {
      background: #D1FAE5;
    }

    /* Priority badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-high { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    .badge-medium { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; }
    .badge-low { background: #F1F5F9; color: #64748B; border: 1px solid #E2E8F0; }

    .acard-menu {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid #F1F5F9;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #94A3B8;
      transition: all 0.15s;
    }
    .acard-menu:hover { background: #ECFDF5; border-color: #A7F3D0; color: #059669; }

    .acard-title {
      font-size: 16px;
      font-weight: 700;
      color: #0F172A;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .acard-desc {
      font-size: 13px;
      color: #64748B;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* Impact insight strip */
    .acard-insight {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ECFDF5;
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 18px;
    }

    .acard-insight svg { color: #059669; flex-shrink: 0; width: 14px; height: 14px; }

    .acard-insight span {
      font-size: 12.5px;
      font-weight: 600;
      color: #047857;
    }

    /* CTA button */
    .acard-btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: #1D4ED8;
      color: #fff;
      font-size: 13.5px;
      font-weight: 600;
      text-align: center;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      margin-top: auto;
      font-family: 'Inter', sans-serif;
    }

    .acard-btn:hover {
      background: #1E40AF;
      box-shadow: 0 4px 14px rgba(29,78,216,0.30);
    }

    /* ── SECTION DIVIDER ───────────────────────────────── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 48px 0 32px;
    }

    .section-divider-line { flex: 1; height: 1px; background: #E2E8F0; }
    .section-divider-label {
      font-size: 10px;
      font-weight: 700;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    /* ── LOAN READINESS CARDS ──────────────────────────── */
    .loan-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    @media (max-width: 1024px) { .loan-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .loan-grid { grid-template-columns: 1fr; } }

    .loan-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(15,23,42,0.05);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .loan-card:hover {
      box-shadow: 0 6px 24px rgba(5,150,105,0.08);
      transform: translateY(-2px);
    }

    .loan-card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .loan-card-icon.emerald { background: #ECFDF5; color: #059669; }
    .loan-card-icon.blue    { background: #EFF6FF; color: #1D4ED8; }
    .loan-card-icon.amber   { background: #FFFBEB; color: #D97706; }

    .loan-card-title { font-size: 15px; font-weight: 700; color: #0F172A; margin-bottom: 5px; }
    .loan-card-desc  { font-size: 13px; color: #64748B; margin-bottom: 14px; line-height: 1.5; }

    .loan-progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #64748B;
      margin-bottom: 6px;
    }

    .loan-progress-label strong { color: #0F172A; font-weight: 700; }

    .progress-bar {
      height: 6px;
      background: #F1F5F9;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #10B981, #047857);
    }

    .loan-card-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1.5px solid #E2E8F0;
      color: #0F172A;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'Inter', sans-serif;
    }

    .loan-card-btn:hover {
      border-color: #059669;
      color: #047857;
      background: #ECFDF5;
    }

    /* ── SCORE WIDGET ──────────────────────────────────── */
    .score-widget {
      background: linear-gradient(135deg, #047857 0%, #059669 50%, #10B981 100%);
      border-radius: 16px;
      padding: 22px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .score-widget::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .score-widget-label { font-size: 11px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .score-widget-value { font-size: 40px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; line-height: 1; margin-bottom: 4px; }
    .score-widget-sub { font-size: 12px; opacity: 0.75; margin-bottom: 16px; }

    .score-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js?v=10"></script>
<script>
  function checkAuth() {
    if (!window.saakhAuthInitialized) return;
    const user = window.currentUser;
    if (!user) {
      window.location.href = 'index.html?triggerLogin=true';
    } else {
      updateDashboardUserUI(user);
      const shell = document.querySelector('.app-shell');
      if (shell) shell.style.display = 'flex';
    }
  }

  if (window.saakhAuthInitialized) {
    checkAuth();
  } else {
    window.addEventListener('saakh-auth-initialized', checkAuth);
  }

  window.addEventListener('saakh-auth-changed', () => {
    if (window.saakhAuthInitialized) {
      checkAuth();
    }
  });


  function updateDashboardUserUI(user) {
    const userNames = document.querySelectorAll('.user-name');
    const userAvatars = document.querySelectorAll('.avatar');
    const bizNames = document.querySelectorAll('.topbar-biz-name, .header-title-lg');
    
    const shopName = user.user_metadata?.shop_name || 'My Business';
    const email = user.email || 'User';
    
    bizNames.forEach(el => {
      el.textContent = shopName;
    });
    
    userNames.forEach(el => {
      el.textContent = shopName;
    });
    
    userAvatars.forEach(el => {
      const initial = (shopName || email).charAt(0).toUpperCase();
      el.textContent = initial;
    });
  }
</script>
